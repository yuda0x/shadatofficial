    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden;
            font-family: 'Hind Siliguri', 'Inter', sans-serif; color: #fff;
        }

        /* ── Player Wrappers ── */
        #vjs-wrapper, #fluid-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        #fluid-wrapper { display: none; background: #000; z-index: 1; }
        #vjs-wrapper { z-index: 2; }
        .fluid_video_wrapper { width: 100% !important; height: 100% !important; }
        .video-js { width: 100% !important; height: 100% !important; background-color: transparent; }

        /* ── Sticky Notice Bar ── */
        .sticky-notice {
            position: fixed; top: 0; left: 0; width: 100%;
            background: linear-gradient(90deg, #ff2a2a, #c62828);
            color: #fff; text-align: center; padding: 10px 45px 10px 15px;
            font-size: 15px; font-weight: 600; z-index: 1000000;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,.5);
            font-family: 'Hind Siliguri', sans-serif; transition: all .3s ease;
        }
        .sticky-notice span { flex: 1; }
        .sticky-notice .close-btn {
            position: absolute; right: 12px;
            background: rgba(0,0,0,.2); border: 1px solid rgba(255,255,255,.2);
            color: #fff; font-size: 18px; width: 28px; height: 28px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all .3s ease;
        }
        .sticky-notice .close-btn:hover {
            background: rgba(0,0,0,.5); border-color: rgba(255,255,255,.5); transform: scale(1.1);
        }

        /* ── Video.js Control Bar ── */
        .video-js .vjs-control-bar {
            background: rgba(18,18,18,.85) !important;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.08); border-radius: 40px !important;
            bottom: 30px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: calc(100% - 60px) !important; max-width: 850px !important;
            height: 56px !important; display: flex !important; align-items: center !important;
            padding: 0 15px !important;
            box-shadow: 0 15px 35px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1);
            transition: opacity .4s ease, transform .4s ease;
        }
        .video-js .vjs-button {
            width: 40px !important; height: 40px !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
            border-radius: 50% !important; margin: 0 3px !important;
            transition: all .2s ease; background: none !important;
        }
        .video-js .vjs-button:hover { background: rgba(255,255,255,.15) !important; }
        .video-js .vjs-icon-placeholder::before {
            font-size: 1.5em !important; line-height: 1 !important;
            display: flex; align-items: center; justify-content: center;
        }
        .video-js .vjs-volume-panel { display: flex !important; align-items: center !important; width: auto !important; }
        .video-js .vjs-volume-panel .vjs-volume-control { display: flex !important; align-items: center !important; height: 100% !important; }
        .video-js .vjs-picture-in-picture-control, .video-js .vjs-subs-caps-button { display: flex !important; }
        .video-js .vjs-live-control, .video-js .vjs-live-display,
        .vjs-current-time, .vjs-duration, .vjs-remaining-time, .vjs-time-divider { display: none !important; }

        /* Progress Bar */
        .video-js .vjs-progress-control { display: flex !important; flex: auto; align-items: center; margin: 0 10px; }
        .video-js .vjs-progress-holder { height: 6px; border-radius: 4px; background: rgba(255,255,255,.2); }
        .video-js .vjs-play-progress { background-color: #ff2a2a; border-radius: 4px; }
        .video-js .vjs-play-progress::before { font-size: 14px; top: -4px; color: #ff2a2a; }
        .video-js .vjs-load-progress { background: rgba(255,255,255,.1) !important; border-radius: 4px; }
        .video-js .vjs-load-progress div { background: rgba(255,255,255,.15) !important; border-radius: 4px; }

        /* ── Global UI Widgets ── */
        .global-live-indicator-box {
            position: absolute; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; align-items: center; gap: 8px;
            pointer-events: none; background: rgba(0,0,0,.4); padding: 5px 10px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,.05);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,.3); top: 25px; transition: top .3s ease;
        }
        .social-box {
            position: absolute; left: 30px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(15,15,15,.6); backdrop-filter: blur(12px);
            padding: 12px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,.08); box-shadow: 0 10px 30px rgba(0,0,0,.3);
            top: 30px; transition: top .3s ease;
        }
        .server-box {
            position: absolute; right: 30px; z-index: 9999;
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
            background: rgba(15,15,15,.6); backdrop-filter: blur(12px);
            padding: 8px 12px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,.08); box-shadow: 0 10px 30px rgba(0,0,0,.3);
            top: 30px; transition: top .3s ease;
        }

        /* Shift UI down when notice bar is visible */
        body.has-notice .global-live-indicator-box { top: 55px; }
        body.has-notice .social-box { top: 55px; }
        body.has-notice .server-box { top: 55px; }

        /* Live Badge */
        .global-live-badge {
            background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px; padding: 0 14px; height: 32px;
            display: flex; align-items: center;
            font-size: 12px; font-weight: 700; letter-spacing: .5px;
            color: #fff; text-transform: uppercase;
        }
        .global-live-badge::before {
            content: ''; display: inline-block; width: 8px; height: 8px;
            background-color: #ff2a2a; border-radius: 50%; margin-right: 8px;
            box-shadow: 0 0 8px rgba(255,42,42,.8); animation: pulse-dot 1.5s infinite;
        }
        .vjs-view-counter {
            display: flex !important; align-items: center !important;
            color: #ff4d4d !important; font-size: 13px !important; font-weight: 600 !important;
            background: rgba(76,175,80,.05); padding: 0 12px !important; height: 32px !important;
            border-radius: 20px !important; border: 1px solid rgba(255,77,77,.2) !important;
        }
        .vjs-view-counter svg { margin-right: 6px; }

        @keyframes pulse-dot {
            0%   { transform: scale(.95); box-shadow: 0 0 0 0 rgba(255,42,42,.7); }
            70%  { transform: scale(1);   box-shadow: 0 0 0 6px rgba(255,42,42,0); }
            100% { transform: scale(.95); box-shadow: 0 0 0 0 rgba(255,42,42,0); }
        }

        /* Fluid Player Controls */
        .fluid_controls_container {
            background: rgba(18,18,18,.85) !important;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.08); border-radius: 40px !important;
            bottom: 30px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: calc(100% - 60px) !important; max-width: 850px !important;
            height: 56px !important; box-shadow: 0 15px 35px rgba(0,0,0,.5); padding: 0 10px;
        }

        /* Social Buttons */
        .social-btn {
            display: flex; align-items: center; gap: 10px; padding: 10px 18px;
            border-radius: 10px; font-size: 13px; font-weight: 600;
            color: #fff; text-decoration: none; transition: .3s;
        }
        .btn-fb { background: rgba(24,119,242,.2); border: 1px solid rgba(24,119,242,.4); color: #6db0ff; }
        .btn-fb:hover { background: #1877F2; color: #fff; }
        .btn-logo { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); color: #fff; }
        .btn-logo:hover { background: rgba(255,255,255,.15); color: #fff; }
        .btn-tw { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #e7e7e7; }
        .btn-tw:hover { background: #000; color: #fff; }
        .btn-tg { background: rgba(34,158,217,.2); border: 1px solid rgba(34,158,217,.4); color: #6fc8ff; }
        .btn-tg:hover { background: #229ED9; color: #fff; }
        .close-social {
            align-self: flex-end; background: none; border: none;
            color: #888; font-size: 16px; cursor: pointer; margin: -5px 0; transition: .2s;
        }
        .close-social:hover { color: #fff; }

        /* Server Buttons */
        .server-btn {
            background: none; color: #aaa; padding: 8px 16px; border-radius: 30px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .3s; border: none; position: relative;
        }
        .server-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
        .server-btn.active { background: #ff2a2a; color: #fff; box-shadow: 0 4px 15px rgba(255,42,42,.4); font-weight: 700; }
        .badge-hd::after {
            content: 'HD'; position: absolute; top: -6px; right: -4px;
            background: #00d2ff; color: #000; font-size: 9px; font-weight: 800;
            padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,.5);
        }
        .badge-4k::after {
            content: '4K'; position: absolute; top: -6px; right: -4px;
            background: #FFD700; color: #000; font-size: 9px; font-weight: 800;
            padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(255,215,0,.5);
        }

        /* ── Content Locker ── */
        #content-locker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 999999; display: none; align-items: center; justify-content: center;
        }
        .locker-box {
            background: linear-gradient(145deg, rgba(25,25,25,.95), rgba(12,12,12,.98));
            border: 1px solid rgba(255,255,255,.05); padding: 50px 35px; border-radius: 30px;
            text-align: center; max-width: 420px; width: 90%; position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05);
            animation: popIn .6s forwards;
        }
        @keyframes popIn {
            0%   { transform: scale(.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0);    opacity: 1; }
        }
        .locker-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #1877F2, #00d2ff, #1877F2);
            box-shadow: 0 2px 15px rgba(0,210,255,.5);
        }
        .lock-icon {
            background: linear-gradient(135deg, rgba(24,119,242,.15), rgba(0,210,255,.05));
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px; color: #00d2ff; border: 1px solid rgba(0,210,255,.2);
            animation: iconPulse 2s infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 0 0   rgba(24,119,242,0); }
            70%       { box-shadow: 0 0 0 20px rgba(24,119,242,0); }
        }
        .locker-box h2 { font-size: 26px; margin: 0 0 12px; color: #fff; font-weight: 700; }
        .locker-box p  { font-size: 17px; color: #a3a3a3; margin: 0 0 35px; line-height: 1.6; font-weight: 500; }
        .locker-fb-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, #1877F2, #145dbf); color: #fff;
            padding: 16px 20px; border-radius: 16px; font-weight: 600;
            text-decoration: none; border: none; width: 100%;
            font-size: 18px; cursor: pointer; transition: all .3s ease;
            font-family: 'Hind Siliguri', sans-serif;
        }
        .locker-fb-btn:hover { background: linear-gradient(135deg, #166fe5, #114e9f); transform: translateY(-3px); }
        .countdown-text {
            font-size: 18px; font-weight: 600; color: #4CAF50; display: none; margin-top: 25px;
            background: rgba(76,175,80,.1); padding: 14px; border-radius: 12px;
            border: 1px solid rgba(76,175,80,.2);
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .sticky-notice { font-size: 13px; padding: 10px 40px 10px 10px; }
            .sticky-notice .close-btn { right: 8px; width: 24px; height: 24px; font-size: 16px; }

            .social-box { padding: 10px; transform: scale(.85); transform-origin: top left; }
            .server-box {
                flex-direction: row; flex-wrap: nowrap; justify-content: flex-start;
                overflow-x: auto; -webkit-overflow-scrolling: touch;
                top: auto; bottom: 80px; right: 50%; transform: translateX(50%); max-width: 95%;
            }
            .server-box::-webkit-scrollbar { display: none; }
            .server-btn { white-space: nowrap; }

            .video-js .vjs-control-bar {
                width: 96% !important; bottom: 15px !important;
                height: 48px !important; padding: 0 5px !important;
            }
            .video-js .vjs-button { width: 30px !important; height: 30px !important; margin: 0 2px !important; }
            .video-js .vjs-icon-placeholder::before { font-size: 1.3em !important; }
            .video-js .vjs-progress-control { margin: 0 4px !important; }
            .fluid_controls_container { width: 96% !important; bottom: 15px !important; height: 48px !important; }

            .global-live-indicator-box { top: 15px; transform: translateX(-50%) scale(.9); padding: 4px 8px; }
            .social-box { top: 15px; left: 10px; }

            body.has-notice .global-live-indicator-box { top: 50px; }
            body.has-notice .social-box { top: 50px; }
            body.has-notice .server-box { top: auto; bottom: 80px; }

            .global-live-badge { height: 28px; padding: 0 10px; font-size: 11px; }
            .vjs-view-counter { padding: 0 8px !important; font-size: 11px !important; height: 28px !important; }
            .locker-box { padding: 40px 25px; }
            .locker-box h2 { font-size: 22px; }
            .locker-box p  { font-size: 15px; }
        }
    </style>
</head>

        const timer = setInterval(() => {
            sec--;
            numEl.textContent = bengaliNums[Math.max(sec, 0)];
            if (sec <= 0) {
                clearInterval(timer);
                localStorage.setItem(CONFIG.lockerKey, '1');
                document.getElementById('content-locker').style.display = 'none';
            }
        }, 1000);
    }

    /* ─── Viewer Counter ─── */
    (function initCounter() {
        if (!CONFIG.isCounterEnabled) return;
        const el = document.getElementById('liveViewerCount');
        let current = CONFIG.baseViews;

        function formatNum(n) {
            return n >= 1000
                ? (n / 1000).toFixed(1).replace('.0', '') + 'K'
                : n.toString();
        }

        function update() {
            const delta = Math.floor(Math.random() * 41) - 20; // -20 to +20
            current = Math.max(100, current + delta);
            el.textContent = formatNum(current);
        }

        update();
        setInterval(update, CONFIG.counterInterval);
    })();

    /* ─── Video.js Player ─── */
    const vjsPlayer = videojs('live-player', {
        fluid          : false,
        responsive     : true,
        liveui         : true,
        html5          : { vhs: { overrideNative: true } },
        controlBar     : {
            children: [
                'playToggle',
                'volumePanel',
                'progressControl',
                'pictureInPictureToggle',
                'subsCapsButton',
                'fullscreenToggle',
            ]
        }
    });

    /* ─── Smart TV / Chromecast detection (basic) ─── */
    const isTV = /SmartTV|Tizen|WebOS|SMART-TV|HbbTV/i.test(navigator.userAgent);
    if (isTV) vjsPlayer.muted(false);

    /* ─── Server Switcher ─── */
    let activeServer = 0;
    const vjsWrapper   = document.getElementById('vjs-wrapper');
    const fluidWrapper = document.getElementById('fluid-wrapper');
    let fluidInstance  = null;

    function changeServer(url, index) {
        // Update button states
        document.querySelectorAll('.server-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
        });
        activeServer = index;

        if (index === 1) {
            /* ── Fluid Player for Server 2 ── */
            vjsWrapper.style.display   = 'none';
            fluidWrapper.style.display = 'block';
            vjsWrapper.style.zIndex    = '1';
            fluidWrapper.style.zIndex  = '2';

            if (fluidInstance) {
                try { fluidInstance.destroy(); } catch(e) {}
                fluidInstance = null;
                document.getElementById('fluid-player').src = '';
            }

            const fp = document.getElementById('fluid-player');
            fp.src   = url;

            fluidInstance = fluidplayer('fluid-player', {
                layoutControls: {
                    primaryColor   : '#ff2a2a',
                    autoPlay       : true,
                    mute           : false,
                    allowDownload  : false,
                    playbackRateEnabled: false,
                    fillToContainer: true,
                    controlBar     : { autoHideTimeout: 3 }
                }
            });

        } else {
            /* ── Video.js for all other servers ── */
            vjsWrapper.style.display   = 'block';
            fluidWrapper.style.display = 'none';
            vjsWrapper.style.zIndex    = '2';
            fluidWrapper.style.zIndex  = '1';

            if (fluidInstance) {
                try { fluidInstance.destroy(); } catch(e) {}
                fluidInstance = null;
            }

            vjsPlayer.src({ src: url, type: 'application/x-mpegURL' });
            vjsPlayer.play().catch(() => {});
        }
    }
    </script>
</body>
</html>
